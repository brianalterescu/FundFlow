<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/FundFlow-Favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca&display=swap" rel="stylesheet">
  <title>Fund Flow</title>
  <link rel="stylesheet" href="styles.css">

<!-- Primary Meta Tags -->
<title>Fund Flow — All-in-One Social Finance Tracker</title>
<meta name="title" content="Fund Flow — All-in-One Social Finance Tracker" />
<meta name="description" content="Fund Flow helps you consolidate your finances, track expenses on the go, and build better money habits — without ever connecting your bank accounts." />

<!-- Open Graph / iMessage / Facebook -->
<meta property="og:type" content="website" />
<meta property="og:url" content="https://fundflow.ing/" />
<meta property="og:title" content="Fund Flow — All-in-One Social Finance Tracker" />
<meta property="og:description" content="Track expenses, set goals, and gain clarity across all your accounts. No banking information required. Secure, simple, and spreadsheet-free." />
<meta property="og:image" content="https://fundflow.ing/FundFlow-Favicon.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="1200" />

<!-- Apple / iMessage Enhancements -->
<meta property="og:site_name" content="Fund Flow" />
<meta name="apple-mobile-web-app-title" content="Fund Flow" />

<!-- Twitter (used as fallback by iMessage sometimes) -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Fund Flow — All-in-One Social Finance Tracker" />
<meta name="twitter:description" content="Eliminate spreadsheets. Consolidate your finances. Track expenses securely with no bank connections." />
<meta name="twitter:image" content="https://fundflow.ing/FundFlow-Favicon.png" />

<!-- Favicon -->
<link rel="icon" href="./FundFlow-Favicon.png" type="image/png" />

<!-- Theme Color -->
<meta name="theme-color" content="#06D6A0" />

<!-- Canonical URL -->
<link rel="canonical" href="https://fundflow.ing/" />

</head>

<body>
  <div id="root"></div>

  <!-- When loading the HTML file, the main.jsx is determining which jsx file will be displayed to the user. -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
